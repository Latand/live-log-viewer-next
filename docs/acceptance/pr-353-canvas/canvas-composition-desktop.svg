<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" font-family="Inter, system-ui, sans-serif">
  <title>#353 desktop composition — conversation-card shells inside the compact colored PipelineGroup</title>
  <rect width="960" height="470" fill="#f1f2f4"/>

  <!-- Compact colored PipelineGroup container (#451), header + content-sized body -->
  <g transform="translate(40 28)">
    <!-- collapsed/compact header row (preserved from #451) -->
    <rect x="0" y="0" width="880" height="52" rx="10" fill="#ffffff" stroke="#2f6db3" stroke-width="1.5"/>
    <circle cx="26" cy="26" r="5" fill="#2f6db3"/>
    <text x="44" y="31" font-size="14" font-weight="600" fill="#16181d">Restore the conversation pipeline canvas</text>
    <text x="792" y="31" font-size="12" fill="#6b7280">stage 2/4</text>

    <!-- expanded body: sizes to its cards (no fixed white slab, no detached strip) -->
    <rect x="0" y="60" width="880" height="382" rx="10" fill="#ffffff" stroke="#2f6db3" stroke-width="1.5"/>
    <text x="16" y="86" font-size="12.5" font-weight="700" fill="#16181d">Override · Restore the conversation pipeline canvas</text>

    <!-- the real conversation-card graph mounts INSIDE this body -->
    <g transform="translate(16 100)">
      <rect x="0" y="0" width="848" height="286" rx="8" fill="#f7f8fa"/>

      <!-- directed pass link plan -> build -->
      <path d="M172 66 L250 66" fill="none" stroke="#2f9e5b" stroke-width="3" stroke-linecap="round"/>
      <path d="M244 61 L256 66 L244 71 Z" fill="#2f9e5b"/>
      <!-- fail loop review -> build (bounded repair) -->
      <path d="M330 150 C300 150 300 92 262 78" fill="none" stroke="#c8912f" stroke-width="2.5" stroke-dasharray="7 6" stroke-linecap="round"/>
      <path d="M268 84 L258 78 L270 73 Z" fill="#c8912f"/>
      <!-- pass link build -> review (down) -->
      <path d="M330 92 L330 120" fill="none" stroke="#9aa1ab" stroke-width="2"/>
      <path d="M325 116 L330 126 L335 116 Z" fill="#9aa1ab"/>
      <!-- pass link build -> ship (right, scrolls on the 360px board) -->
      <path d="M420 66 L520 66" fill="none" stroke="#c9ccd2" stroke-width="2" stroke-dasharray="2 6"/>

      <!-- plan: passed (completed round) -->
      <g transform="translate(24 24)">
        <rect width="148" height="84" rx="8" fill="#ffffff" stroke="#2f9e5b" stroke-width="1.5"/>
        <circle cx="26" cy="26" r="13" fill="#e6f4ec"/>
        <circle cx="26" cy="26" r="6" fill="none" stroke="#2f9e5b" stroke-width="2"/>
        <text x="48" y="31" font-size="13" font-weight="700" fill="#16181d">plan</text>
        <text x="132" y="31" font-size="13" font-weight="700" fill="#2f9e5b">✓</text>
        <text x="16" y="62" font-size="11.5" font-weight="600" fill="#6b7280">passed · fable-5</text>
      </g>

      <!-- build: live conversation (running) -->
      <g transform="translate(250 24)">
        <rect width="148" height="84" rx="8" fill="#ffffff" stroke="#5b5bd6" stroke-width="1.5"/>
        <circle cx="26" cy="26" r="13" fill="#ecebfb"/>
        <path d="M20 20 l12 6 -12 6 z" fill="#5b5bd6"/>
        <text x="48" y="31" font-size="13" font-weight="700" fill="#16181d">build</text>
        <text x="132" y="31" font-size="13" font-weight="700" fill="#5b5bd6">▶</text>
        <text x="16" y="62" font-size="11.5" font-weight="600" fill="#6b7280">running · gpt-5.6-sol</text>
      </g>

      <!-- review: pending placeholder (dashed ghost) -->
      <g transform="translate(250 128)">
        <rect width="148" height="52" rx="8" fill="#f7f8fa" stroke="#c9ccd2" stroke-width="1.5" stroke-dasharray="5 4"/>
        <path d="M18 26 a8 8 0 1 1 0 0.01" fill="none" stroke="#9aa1ab" stroke-width="1.5"/>
        <text x="36" y="30" font-size="12.5" font-weight="700" fill="#4b5563">review</text>
        <text x="132" y="30" font-size="10.5" fill="#9aa1ab" text-anchor="end">pending</text>
      </g>

      <!-- ship: pending placeholder, off to the right (board scrolls) -->
      <g transform="translate(520 24)" opacity="0.55">
        <rect width="148" height="84" rx="8" fill="#f7f8fa" stroke="#c9ccd2" stroke-width="1.5" stroke-dasharray="5 4"/>
        <text x="16" y="31" font-size="13" font-weight="700" fill="#4b5563">ship</text>
        <text x="16" y="62" font-size="11.5" font-weight="600" fill="#9aa1ab">pending · queued</text>
      </g>
    </g>

    <!-- compact lifecycle controls (no tall nested-scroll form) -->
    <g transform="translate(16 398)">
      <rect x="0" y="0" width="418" height="30" rx="15" fill="#f2f3f5" stroke="#e2e4e8"/>
      <text x="209" y="20" font-size="11" font-weight="700" fill="#6b7280" text-anchor="middle">❙❙  Pause pipeline</text>
      <rect x="430" y="0" width="418" height="30" rx="15" fill="#f2f3f5" stroke="#e2e4e8"/>
      <text x="639" y="20" font-size="11" font-weight="700" fill="#6b7280" text-anchor="middle">✕  Close pipeline</text>
    </g>
  </g>
</svg>
