<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" font-family="sans-serif">
  <rect width="1400" height="560" fill="#f4f7fa"/>
  <text x="28" y="42" font-size="18" font-weight="700" fill="#16223a">#353 — main canvas is the pipeline editor (desktop 1400×560)</text>
  <text x="28" y="66" font-size="12" fill="#5b6b82">Synthetic frame. Fabricated stage ids, no live data, path, project, or account.</text>

  <!-- draft group halo -->
  <rect x="28" y="92" width="1344" height="440" rx="20" fill="#fff8ec" stroke="#d99a2b" stroke-width="2" stroke-dasharray="10 8"/>
  <rect x="52" y="78" width="150" height="26" rx="13" fill="#ffffff" stroke="#d99a2b" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="70" y="96" font-size="12" font-weight="700" fill="#b47b17">Draft pipeline</text>

  <!-- on-canvas draft action bar (AC7) -->
  <g>
    <rect x="52" y="118" width="1296" height="40" rx="10" fill="#ffffff" stroke="#dbe2ec"/>
    <rect x="66" y="128" width="168" height="20" rx="10" fill="#f3f6fb" stroke="#c7d0dd"/>
    <text x="82" y="142" font-size="11" font-weight="700" fill="#41506a">＋ Add conversation</text>
    <rect x="244" y="128" width="150" height="20" rx="10" fill="#f3f6fb" stroke="#c7d0dd"/>
    <text x="260" y="142" font-size="11" font-weight="700" fill="#41506a">＋ Add review</text>
    <text x="1150" y="142" font-size="11" fill="#8595a9">nodes added directly on the canvas</text>
  </g>

  <!-- pass edge -->
  <g stroke="#2f6f4f" stroke-width="3" fill="none">
    <path d="M470 250 H556"/>
  </g>
  <path d="M548 244 L560 250 L548 256 Z" fill="#2f6f4f"/>
  <!-- fail (repair) edge, dashed amber, review -> build -->
  <g stroke="#d99a2b" stroke-width="3" fill="none" stroke-dasharray="7 6">
    <path d="M900 320 C 700 400, 400 400, 300 320"/>
  </g>
  <path d="M308 328 L296 320 L309 314 Z" fill="#d99a2b"/>

  <!-- implement node (compact conversation-card shell) -->
  <g>
    <rect x="180" y="196" width="290" height="108" rx="12" fill="#ffffff" stroke="#3454a6" stroke-width="2"/>
    <circle cx="212" cy="228" r="15" fill="#e7ecfa"/>
    <text x="205" y="233" font-size="14" fill="#3454a6">🔨</text>
    <text x="240" y="224" font-size="15" font-weight="700" fill="#16223a">implement</text>
    <text x="240" y="246" font-size="12" fill="#5b6b82">queued · builder · claude</text>
    <text x="200" y="286" font-size="11" fill="#8595a9">same header/role/model/status grammar as a conversation</text>
  </g>

  <!-- review node with OPEN compact popover editor (AC6) -->
  <g>
    <rect x="820" y="150" width="300" height="360" rx="12" fill="#ffffff" stroke="#7a4fa6" stroke-width="2"/>
    <circle cx="852" cy="182" r="15" fill="#f0eaf6"/>
    <text x="845" y="187" font-size="14" fill="#7a4fa6">🛡️</text>
    <text x="880" y="178" font-size="15" font-weight="700" fill="#16223a">review</text>
    <text x="880" y="200" font-size="12" fill="#5b6b82">waiting · round 1/5</text>
    <line x1="820" y1="222" x2="1120" y2="222" stroke="#e4e8ef"/>

    <!-- compact settings grid: role/effort -->
    <text x="840" y="248" font-size="10" font-weight="700" fill="#7a869c">ROLE</text>
    <rect x="840" y="254" width="130" height="26" rx="7" fill="#f7f9fc" stroke="#c7d0dd"/>
    <text x="852" y="271" font-size="11" fill="#16223a">Reviewer ▾</text>
    <text x="982" y="248" font-size="10" font-weight="700" fill="#7a869c">EFFORT</text>
    <rect x="982" y="254" width="120" height="26" rx="7" fill="#f7f9fc" stroke="#c7d0dd"/>
    <text x="994" y="271" font-size="11" fill="#16223a">high ▾</text>

    <!-- model/access -->
    <text x="840" y="304" font-size="10" font-weight="700" fill="#7a869c">MODEL</text>
    <rect x="840" y="310" width="160" height="26" rx="7" fill="#f7f9fc" stroke="#c7d0dd"/>
    <text x="852" y="327" font-size="11" fill="#16223a">claude-opus ▾</text>
    <text x="1012" y="304" font-size="10" font-weight="700" fill="#7a869c">ACCESS</text>
    <rect x="1012" y="310" width="90" height="26" rx="7" fill="#f7f9fc" stroke="#c7d0dd"/>
    <text x="1024" y="327" font-size="11" fill="#16223a">read-only ▾</text>

    <!-- stage prompt -->
    <text x="840" y="360" font-size="10" font-weight="700" fill="#7a869c">ADDITIONAL PROMPT</text>
    <rect x="840" y="366" width="262" height="52" rx="7" fill="#f7f9fc" stroke="#c7d0dd"/>
    <text x="852" y="386" font-size="11" fill="#41506a">Focus the review on the parser edge</text>
    <text x="852" y="402" font-size="10" fill="#9aa7bb">wiring {{task}} stays automatic</text>

    <!-- connections (edge controls) + apply -->
    <text x="840" y="440" font-size="10" font-weight="700" fill="#7a869c">CONNECTIONS</text>
    <rect x="840" y="446" width="120" height="22" rx="11" fill="#eef7f1" stroke="#2f6f4f"/>
    <text x="852" y="461" font-size="10" fill="#2f6f4f">pass → done</text>
    <rect x="968" y="446" width="134" height="22" rx="11" fill="#fdf3e3" stroke="#d99a2b"/>
    <text x="980" y="461" font-size="10" fill="#b47b17">fail → implement ⟳5</text>
    <rect x="1012" y="476" width="90" height="26" rx="13" fill="#3454a6"/>
    <text x="1028" y="493" font-size="11" font-weight="700" fill="#ffffff">Apply</text>
  </g>

  <text x="28" y="552" font-size="11" fill="#8595a9">Compact in-node popover edits role · model · effort · access · prompt and draws pass/fail links — no tall field stack, no nested editor scrollbar.</text>
</svg>
