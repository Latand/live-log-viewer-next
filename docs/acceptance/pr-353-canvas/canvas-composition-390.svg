<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="Inter, system-ui, sans-serif">
  <title>#353 mobile (390px) — chat stays primary, pipeline is a compact dock disclosure; the desktop graph is never mounted</title>
  <rect width="390" height="844" fill="#f1f2f4"/>

  <!-- Conversation header: the transcript is the dominant surface -->
  <rect x="0" y="0" width="390" height="44" fill="#ffffff" stroke="#e2e4e8"/>
  <text x="16" y="28" font-size="14" font-weight="600" fill="#16181d">Conversation</text>

  <!-- Chat transcript (primary) -->
  <g font-size="12.5">
    <rect x="14" y="62" width="300" height="46" rx="13" fill="#ffffff" stroke="#e2e4e8"/>
    <text x="26" y="82" fill="#16181d">Restore the conversation pipeline canvas</text>
    <text x="26" y="99" fill="#16181d">from the rescued commit.</text>

    <rect x="150" y="120" width="226" height="46" rx="13" fill="#5b5bd6"/>
    <text x="162" y="140" fill="#ffffff">On it — the build stage is running now;</text>
    <text x="162" y="157" fill="#ffffff">review and ship are queued.</text>

    <rect x="14" y="178" width="270" height="30" rx="13" fill="#ffffff" stroke="#e2e4e8"/>
    <text x="26" y="198" fill="#16181d">Great. Keep the pipeline out of the way while I read.</text>
  </g>

  <!-- Compact pipeline dock: a single 44px disclosure row at the foot.
       The large desktop PipelineStageGraph is never mounted here. -->
  <rect x="0" y="800" width="390" height="44" fill="#ffffff" stroke="#e2e4e8"/>
  <circle cx="20" cy="822" r="5" fill="#5b5bd6"/>
  <text x="34" y="827" font-size="13" font-weight="600" fill="#16181d">Restore the conversation pipeline canvas</text>
  <rect x="286" y="812" width="74" height="20" rx="10" fill="#ecebfb"/>
  <text x="323" y="826" font-size="10.5" font-weight="600" fill="#5b5bd6" text-anchor="middle">stages running</text>
  <text x="372" y="827" font-size="12" fill="#6b7280" text-anchor="end">stage 2/4  ⌄</text>
</svg>
