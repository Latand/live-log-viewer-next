<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" font-family="sans-serif">
  <rect width="1400" height="560" fill="#f4f7fa"/>
  <text x="40" y="52" font-size="22" font-weight="700" fill="#16223a">PR #439 — pipeline stage graph navigation (synthetic desktop frame)</text>
  <text x="40" y="80" font-size="14" fill="#5b6b82">Fabricated stages, no live capture or personal data. Behaviour verified by the DOM suite.</text>

  <!-- edges -->
  <g stroke="#9aa7bb" stroke-width="3" fill="none">
    <path d="M300 210 H360"/>
    <path d="M620 210 H680"/>
    <path d="M940 210 H1000"/>
  </g>

  <!-- plan stage: retry stack, first attempt path-only -->
  <g>
    <rect x="60" y="160" width="240" height="100" rx="12" fill="#ffffff" stroke="#2f6f4f" stroke-width="2"/>
    <text x="80" y="196" font-size="18" font-weight="700" fill="#16223a">plan</text>
    <text x="80" y="222" font-size="13" fill="#5b6b82">passed after retry</text>
    <rect x="80" y="234" width="120" height="18" rx="9" fill="#eaf3ee" stroke="#2f6f4f"/>
    <text x="92" y="247" font-size="11" fill="#2f6f4f">attempt 2 (path-only)</text>
  </g>

  <!-- build stage: primary -->
  <g>
    <rect x="380" y="160" width="240" height="100" rx="12" fill="#ffffff" stroke="#3454a6" stroke-width="2"/>
    <text x="400" y="196" font-size="18" font-weight="700" fill="#16223a">build</text>
    <text x="400" y="222" font-size="13" fill="#5b6b82">primary node — opens by id or path</text>
  </g>

  <!-- review stage: implementer + reviewer cycle -->
  <g>
    <rect x="700" y="140" width="240" height="140" rx="12" fill="#ffffff" stroke="#7a4fa6" stroke-width="2"/>
    <text x="720" y="176" font-size="18" font-weight="700" fill="#16223a">review</text>
    <text x="720" y="200" font-size="13" fill="#5b6b82">round 1/3</text>
    <rect x="720" y="212" width="90" height="22" rx="11" fill="#f0eaf6" stroke="#7a4fa6"/>
    <text x="732" y="227" font-size="11" fill="#7a4fa6">implementer</text>
    <rect x="820" y="212" width="90" height="22" rx="11" fill="#f0eaf6" stroke="#7a4fa6"/>
    <text x="836" y="227" font-size="11" fill="#7a4fa6">reviewer</text>
  </g>

  <!-- verify stage: pending ghost -->
  <g>
    <rect x="1020" y="160" width="240" height="100" rx="12" fill="#ffffff" stroke="#9aa7bb" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="1040" y="196" font-size="18" font-weight="700" fill="#5b6b82">verify</text>
    <text x="1040" y="222" font-size="13" fill="#8595a9">pending ghost — clickable</text>
  </g>

  <!-- legend for the repaired surfaces -->
  <g>
    <text x="40" y="360" font-size="14" font-weight="700" fill="#16223a">Navigation precedence</text>
    <text x="40" y="386" font-size="13" fill="#5b6b82">1. conversation id resolves only to its current, non-archived generation</text>
    <text x="40" y="408" font-size="13" fill="#5b6b82">2. otherwise a valid recorded path opens the live transcript</text>
    <text x="40" y="430" font-size="13" fill="#5b6b82">3. neither id nor path stays the unavailable, disabled surface</text>
  </g>
</svg>
