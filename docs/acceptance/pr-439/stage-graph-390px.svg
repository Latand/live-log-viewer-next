<svg xmlns="http://www.w3.org/2000/svg" width="390" height="760" viewBox="0 0 390 760" font-family="sans-serif">
  <rect width="390" height="760" fill="#f4f7fa"/>
  <text x="20" y="40" font-size="16" font-weight="700" fill="#16223a">PR #439 — 390px frame</text>
  <text x="20" y="62" font-size="12" fill="#5b6b82">Synthetic mobile column. No live data.</text>

  <!-- vertical edges -->
  <g stroke="#9aa7bb" stroke-width="3" fill="none">
    <path d="M195 190 V230"/>
    <path d="M195 372 V412"/>
    <path d="M195 594 V634"/>
  </g>

  <!-- plan -->
  <g>
    <rect x="40" y="90" width="310" height="100" rx="12" fill="#ffffff" stroke="#2f6f4f" stroke-width="2"/>
    <text x="60" y="126" font-size="16" font-weight="700" fill="#16223a">plan</text>
    <text x="60" y="150" font-size="12" fill="#5b6b82">passed after retry</text>
    <rect x="60" y="160" width="150" height="18" rx="9" fill="#eaf3ee" stroke="#2f6f4f"/>
    <text x="72" y="173" font-size="11" fill="#2f6f4f">attempt 2 (path-only)</text>
  </g>

  <!-- build -->
  <g>
    <rect x="40" y="230" width="310" height="100" rx="12" fill="#ffffff" stroke="#3454a6" stroke-width="2"/>
    <text x="60" y="266" font-size="16" font-weight="700" fill="#16223a">build</text>
    <text x="60" y="290" font-size="12" fill="#5b6b82">primary node — opens by id or path</text>
  </g>

  <!-- review -->
  <g>
    <rect x="40" y="412" width="310" height="140" rx="12" fill="#ffffff" stroke="#7a4fa6" stroke-width="2"/>
    <text x="60" y="448" font-size="16" font-weight="700" fill="#16223a">review</text>
    <text x="60" y="472" font-size="12" fill="#5b6b82">round 1/3</text>
    <rect x="60" y="484" width="120" height="22" rx="11" fill="#f0eaf6" stroke="#7a4fa6"/>
    <text x="72" y="499" font-size="11" fill="#7a4fa6">implementer</text>
    <rect x="190" y="484" width="120" height="22" rx="11" fill="#f0eaf6" stroke="#7a4fa6"/>
    <text x="206" y="499" font-size="11" fill="#7a4fa6">reviewer</text>
  </g>

  <!-- verify -->
  <g>
    <rect x="40" y="634" width="310" height="90" rx="12" fill="#ffffff" stroke="#9aa7bb" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="60" y="670" font-size="16" font-weight="700" fill="#5b6b82">verify</text>
    <text x="60" y="694" font-size="12" fill="#8595a9">pending ghost — clickable</text>
  </g>
</svg>
