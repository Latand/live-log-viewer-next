name: Privacy publication gate

on:
  pull_request:

permissions:
  contents: read

jobs:
  privacy-publication:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install media inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg tesseract-ocr tesseract-ocr-eng tesseract-ocr-ukr

      - name: Verify privacy gate behavior
        run: bun test scripts/privacy-publication-gate.test.ts

      - name: Scan changed publication surfaces
        env:
          LLV_PRIVACY_KNOWN_VALUE_FINGERPRINTS_FILE: scripts/privacy-known-value-fingerprints.json
          LLV_PRIVACY_OCR_LANGUAGES: eng+ukr
          PRIVACY_BASE_REF: origin/${{ github.base_ref }}
        run: bun scripts/privacy-publication-gate.ts --require-known-values --base "$PRIVACY_BASE_REF"
