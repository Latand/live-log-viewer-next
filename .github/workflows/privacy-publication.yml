name: Privacy publication gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  privacy-publication:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted privacy implementation
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          path: trusted
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Check out candidate as inspection input
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          allow-unsafe-pr-checkout: true
          fetch-depth: 0
          path: candidate
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve current protected base
        working-directory: trusted
        env:
          PRIVACY_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --force origin "+refs/heads/${PRIVACY_BASE_REF}:refs/remotes/origin/${PRIVACY_BASE_REF}"
          PRIVACY_BASE_SHA="$(git rev-parse --verify "refs/remotes/origin/${PRIVACY_BASE_REF}^{commit}")"
          printf 'PRIVACY_BASE_SHA=%s\n' "$PRIVACY_BASE_SHA" >> "$GITHUB_ENV"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.3

      - name: Install trusted dependencies
        working-directory: trusted
        run: bun install --frozen-lockfile

      - name: Install media inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg tesseract-ocr tesseract-ocr-eng tesseract-ocr-ukr

      - name: Verify privacy gate behavior
        working-directory: trusted
        run: bun test scripts/privacy-publication-gate.test.ts

      - name: Scan changed publication surfaces
        env:
          LLV_PRIVACY_KNOWN_VALUE_FINGERPRINTS_FILE: ${{ github.workspace }}/trusted/scripts/privacy-known-value-fingerprints.json
          LLV_PRIVACY_OCR_LANGUAGES: eng+ukr
        working-directory: trusted
        run: bun scripts/privacy-publication-gate.ts --repository ../candidate --require-known-values --base "$PRIVACY_BASE_SHA"
