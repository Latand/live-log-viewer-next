name: Privacy tracker audit

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  pull_request_target:
    types: [opened, edited, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      publication_number:
        description: Issue or pull request number to audit
        required: true
        type: number

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  privacy-tracker-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted audit implementation
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.3

      - name: Install trusted dependencies
        run: bun install --frozen-lockfile

      - name: Install media inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg tesseract-ocr tesseract-ocr-eng tesseract-ocr-ukr

      - name: Audit public tracker surfaces
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLV_PRIVACY_KNOWN_VALUE_FINGERPRINTS_FILE: scripts/privacy-known-value-fingerprints.json
          LLV_PRIVACY_OCR_LANGUAGES: eng+ukr
          PUBLICATION_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || inputs.publication_number }}
          PUBLICATION_REPO: ${{ github.repository }}
        run: bun scripts/privacy-github-audit.ts --repo "$PUBLICATION_REPO" --number "$PUBLICATION_NUMBER"
